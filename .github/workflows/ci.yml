name: ci

# Build + test + lint on every push to main (and on demand). Self-hosted x64 only
# (org convention — no GitHub-hosted runners). PRs merge on green LOCAL test runs;
# the push-to-main run is the CI signal.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        # Bootstrap rustup per-user if the shared runner has no Rust on PATH
        # (idempotent; reused on the non-ephemeral runner after first run).
        run: |
          set -eu
          if ! command -v cargo >/dev/null 2>&1; then
            if [ -x "$HOME/.cargo/bin/cargo" ]; then
              export PATH="$HOME/.cargo/bin:$PATH"
            else
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup component add clippy || echo "::warning::clippy component add failed"

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        # Report-only (no `-D warnings`): the repo had no CI, so it carries some
        # pre-existing clippy lints. Run clippy for signal without failing the build
        # on them; promote to `-- -D warnings` once the backlog is cleared.
        run: cargo clippy --all-targets
